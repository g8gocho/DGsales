<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DGsales - AI Voice & Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #050505;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .bg-glow {
            position: fixed;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%);
            z-index: -1;
        }
        .orb {
            position: absolute;
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.2;
            animation: move 20s infinite alternate;
        }
        @keyframes move {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(20%, 20%); }
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 60px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-bottom: 40px;
        }
        .btn-call {
            background: #fff;
            color: #000;
            border: none;
            padding: 18px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            margin-bottom: 20px;
        }
        .btn-call:hover {
            transform: scale(1.02);
            background: #6366f1;
            color: #fff;
        }
        .status-container {
            margin-top: 20px;
            display: none;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px #22c55e;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        #voice-visualizer {
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-top: 20px;
        }
        .bar {
            width: 4px;
            height: 10px;
            background: #6366f1;
            border-radius: 2px;
            transition: height 0.1s ease;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="orb"></div>
    
    <div class="card">
        <h1>DGsales</h1>
        <p>Voz e Inteligencia Artificial en Tiempo Real</p>
        
        <button class="btn-call" id="callBtn">
            <span id="btnIcon">🎙️</span>
            <span id="btnText">Hablar ahora</span>
        </button>

        <div class="status-container" id="statusArea">
            <div class="status-dot"></div>
            <span id="statusText">Llamada activa...</span>
            <div id="voice-visualizer">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
        </div>
    </div>

    <!-- SDK de Retell -->
    <script src="https://unpkg.com/retell-client-js-sdk@2.0.7/dist/index.umd.js"></script>

    <script>
        let retellWebClient;
        const callBtn = document.getElementById('callBtn');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');
        const statusArea = document.getElementById('statusArea');
        const statusText = document.getElementById('statusText');
        
        let isCalling = false;

        async function initRetell() {
            try {
                // El SDK se expone como window.retellClientJsSdk
                const RetellClient = window.retellClientJsSdk.RetellWebClient;
                retellWebClient = new RetellClient();

                retellWebClient.on("call_started", () => {
                    console.log("Call started");
                    isCalling = true;
                    btnText.textContent = "Finalizar";
                    btnIcon.textContent = "🔴";
                    statusArea.style.display = "block";
                    statusText.textContent = "Agente escuchando...";
                });

                retellWebClient.on("call_ended", () => {
                    console.log("Call ended");
                    resetUI();
                });

                retellWebClient.on("error", (error) => {
                    console.error("Retell Error:", error);
                    alert("Error: " + error.message);
                    resetUI();
                });

                // Visualizador de voz simple
                retellWebClient.on("update", (update) => {
                    if (update.type === "transcript") {
                        // Podríamos mostrar el texto aquí si quisiéramos
                    }
                });

            } catch (e) {
                console.error("Error al inicializar SDK:", e);
            }
        }

        function resetUI() {
            isCalling = false;
            btnText.textContent = "Hablar ahora";
            btnIcon.textContent = "🎙️";
            statusArea.style.display = "none";
        }

        callBtn.addEventListener('click', async () => {
            if (isCalling) {
                retellWebClient.stopCall();
                return;
            }

            try {
                btnText.textContent = "Conectando...";
                
                // Llamamos a tu backend en Vercel para obtener el token
                const response = await fetch('/api/create-call', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ agent_id: 'agent_901b51dc8d7fecaef2e68a82b4' })
                });

                const data = await response.json();
                
                if (!data.access_token) {
                    throw new Error("No se pudo obtener el token de acceso");
                }

                await retellWebClient.startCall({
                    accessToken: data.access_token,
                });

            } catch (err) {
                console.error("Error al iniciar llamada:", err);
                alert("No se pudo iniciar la llamada: " + err.message);
                resetUI();
            }
        });

        // Inicializar al cargar
        window.onload = initRetell;
    </script>
</body>
</html>
