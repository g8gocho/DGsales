<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DGsales - AI Voice & Chat</title>
    <!-- Dependencies for Retell Voice SDK -->
    <script src="https://unpkg.com/eventemitter3@5.0.1/dist/eventemitter3.umd.min.js"></script>
    <script src="https://unpkg.com/livekit-client/dist/livekit-client.umd.js"></script>
    <script src="https://unpkg.com/retell-client-js-sdk@2.0.7/dist/index.umd.js"></script>
    
    <!-- Retell Chat Widget -->
    <script
        id="retell-widget"
        src="https://dashboard.retellai.com/retell-widget.js"
        data-public-key="public_key_262fc8f1f2d032aa6ffee"
        data-agent-id="agent_901b51dc8d7fecaef2e68a82b4"
        data-title="DGsales AI Chat"
        data-bot-name="DG Assistant"
        data-color="#6366f1"
    ></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #050505; color: #fff;
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px;
        }
        .bg-glow { position: fixed; width: 100vw; height: 100vh; background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%); z-index: -1; }
        .container { max-width: 1000px; width: 100%; text-align: center; }
        h1 { font-size: 3rem; margin-bottom: 10px; background: linear-gradient(to right, #fff, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #94a3b8; margin-bottom: 40px; }
        .agents-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .agent-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 30px; transition: transform 0.3s ease; }
        .agent-card:hover { transform: translateY(-5px); border-color: rgba(99, 102, 241, 0.5); }
        .btn-call { background: #fff; color: #000; border: none; padding: 14px; width: 100%; border-radius: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-call:hover { background: #6366f1; color: #fff; }
        .btn-call:disabled { opacity: 0.5; cursor: not-allowed; }
        .status-area { margin-top: 15px; font-size: 0.9rem; color: #22c55e; display: none; }
        #debug-console { position: fixed; bottom: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 10px; font-size: 10px; border-radius: 8px; max-height: 100px; overflow-y: auto; text-align: left; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <h1>DGsales</h1>
        <p>Real-time AI Voice Agents</p>
        <div class="agents-grid">
            <div class="agent-card">
                <h3>Conversation Flow</h3>
                <button class="btn-call" onclick="handleCall('agent_901b51dc8d7fecaef2e68a82b4', this)">🎙️ <span>Llamar ahora</span></button>
                <div class="status-area">Agente en línea...</div>
            </div>
            <div class="agent-card">
                <h3>Healthcare</h3>
                <button class="btn-call" onclick="handleCall('agent_18c0f1ef610e020badc961478e', this)">🎙️ <span>Llamar ahora</span></button>
                <div class="status-area">Agente en línea...</div>
            </div>
            <div class="agent-card">
                <h3>Patient Screening</h3>
                <button class="btn-call" onclick="handleCall('agent_1f088512dfc33e0c68bea6f031', this)">🎙️ <span>Llamar ahora</span></button>
                <div class="status-area">Agente en línea...</div>
            </div>
        </div>
    </div>
    <div id="debug-console">Sistema listo.</div>

    <script>
        let retellClient;
        let activeBtn = null;

        function debug(msg) {
            const el = document.getElementById('debug-console');
            el.innerHTML += '<br>' + msg;
            el.scrollTop = el.scrollHeight;
        }

        window.onload = () => {
            try {
                // Critical Fix for SDK UMD
                window.eventemitter3 = window.EventEmitter3;
                window.livekitClient = window.LivekitClient;
                
                const Sdk = window.retellClientJsSdk;
                if (!Sdk || !Sdk.RetellWebClient) {
                    debug('Error: SDK no cargado correctamente.');
                    return;
                }
                
                retellClient = new Sdk.RetellWebClient();
                debug('SDK Inicializado.');

                retellClient.on("call_started", () => {
                    debug('Llamada activa.');
                    if (activeBtn) {
                        activeBtn.querySelector('span').textContent = ' Finalizar';
                        activeBtn.style.background = '#ef4444';
                        activeBtn.parentElement.querySelector('.status-area').style.display = 'block';
                    }
                });

                retellClient.on("call_ended", () => {
                    debug('Llamada terminada.');
                    resetUI();
                });

                retellClient.on("error", (err) => {
                    debug('Error SDK: ' + err.message);
                    alert("Error: " + err.message);
                    resetUI();
                });
            } catch (e) {
                debug('Init Catch: ' + e.message);
            }
        };

        function resetUI() {
            if (activeBtn) {
                activeBtn.querySelector('span').textContent = ' Llamar ahora';
                activeBtn.style.background = '#fff';
                activeBtn.parentElement.querySelector('.status-area').style.display = 'none';
                activeBtn.disabled = false;
                activeBtn = null;
            }
            document.querySelectorAll('.btn-call').forEach(b => b.disabled = false);
        }

        async function handleCall(agentId, btn) {
            if (activeBtn) {
                retellClient.stopCall();
                return;
            }

            try {
                activeBtn = btn;
                debug('Obteniendo token para ' + agentId);
                btn.querySelector('span').textContent = ' Conectando...';
                document.querySelectorAll('.btn-call').forEach(b => { if(b !== btn) b.disabled = true; });

                const response = await fetch('https://d-gsales.vercel.app/api/create-call', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ agent_id: agentId })
                });

                if (!response.ok) throw new Error('Error backend: ' + response.status);
                const data = await response.json();
                
                debug('Token OK. Iniciando llamada...');
                await retellClient.startCall({ accessToken: data.access_token });
            } catch (err) {
                debug('Error handleCall: ' + err.message);
                alert("Error al iniciar: " + err.message);
                resetUI();
            }
        }
    </script>
</body>
</html>
