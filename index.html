<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DGsales - AI Voice & Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #050505;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .bg-glow {
            position: fixed;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%);
            z-index: -1;
        }
        .container {
            max-width: 1000px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p { color: #94a3b8; margin-bottom: 40px; }
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
        }
        .agent-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            transition: transform 0.3s ease;
        }
        .agent-card:hover { transform: translateY(-5px); border-color: rgba(99, 102, 241, 0.5); }
        .agent-card h3 { margin-bottom: 15px; font-size: 1.4rem; }
        .btn-call {
            background: #fff;
            color: #000;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
        }
        .btn-call:hover { background: #6366f1; color: #fff; }
        .btn-call:disabled { opacity: 0.5; cursor: not-allowed; }
        .status-area {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #22c55e;
            display: none;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <h1>DGsales</h1>
        <p>Selecciona un agente para iniciar una llamada de voz</p>
        
        <div class="agents-grid">
            <!-- Agent 1 -->
            <div class="agent-card">
                <h3>Conversation Flow</h3>
                <p>Soporte general y ventas</p>
                <button class="btn-call" onclick="startCall('agent_901b51dc8d7fecaef2e68a82b4', this)">
                    <span>🎙️</span> Llamar ahora
                </button>
                <div class="status-area">Conectado...</div>
            </div>
            
            <!-- Agent 2 -->
            <div class="agent-card">
                <h3>Healthcare Check-In</h3>
                <p>Asistente de citas médicas</p>
                <button class="btn-call" onclick="startCall('agent_18c0f1ef610e020badc961478e', this)">
                    <span>🎙️</span> Llamar ahora
                </button>
                <div class="status-area">Conectado...</div>
            </div>
            
            <!-- Agent 3 -->
            <div class="agent-card">
                <h3>Patient Screening</h3>
                <p>Verificación de identidad</p>
                <button class="btn-call" onclick="startCall('agent_1f088512dfc33e0c68bea6f031', this)">
                    <span>🎙️</span> Llamar ahora
                </button>
                <div class="status-area">Conectado...</div>
            </div>
        </div>
    </div>

    <!-- SDK Retell Voice -->
    <script src="https://unpkg.com/retell-client-js-sdk@2.0.7/dist/index.umd.js"></script>
    
    <!-- Retell Chat Widget Script -->
    <script
        id="retell-widget"
        src="https://dashboard.retellai.com/retell-widget.js"
        data-public-key="public_key_262fc8f1f2d032aa6ffee"
        data-agent-id="agent_901b51dc8d7fecaef2e68a82b4"
        data-title="DGsales AI Chat"
        data-bot-name="DG Assistant"
        data-color="#6366f1"
    ></script>

    <script>
        let retellClient;
        let activeBtn = null;

        window.onload = () => {
            const RetellClient = window.retellClientJsSdk.RetellWebClient;
            retellClient = new RetellClient();

            retellClient.on("call_started", () => {
                if (activeBtn) {
                    activeBtn.querySelector('span').textContent = '🔴';
                    activeBtn.lastChild.textContent = ' Finalizar';
                    activeBtn.parentElement.querySelector('.status-area').style.display = 'block';
                }
            });

            retellClient.on("call_ended", () => {
                resetUI();
            });

            retellClient.on("error", (err) => {
                console.error(err);
                alert("Error: " + err.message);
                resetUI();
            });
        };

        function resetUI() {
            if (activeBtn) {
                activeBtn.querySelector('span').textContent = '🎙️';
                activeBtn.lastChild.textContent = ' Llamar ahora';
                activeBtn.parentElement.querySelector('.status-area').style.display = 'none';
                activeBtn.disabled = false;
                activeBtn = null;
            }
            document.querySelectorAll('.btn-call').forEach(b => b.disabled = false);
        }

        async function startCall(agentId, btn) {
            if (activeBtn) {
                retellClient.stopCall();
                return;
            }

            try {
                activeBtn = btn;
                document.querySelectorAll('.btn-call').forEach(b => { if(b !== btn) b.disabled = true; });
                btn.lastChild.textContent = ' Conectando...';

                // Usamos la URL absoluta de Vercel para la API
                const response = await fetch('https://d-gsales.vercel.app/api/create-call', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ agent_id: agentId })
                });

                const data = await response.json();
                if (!data.access_token) throw new Error("No se pudo obtener el token");

                await retellClient.startCall({ accessToken: data.access_token });
            } catch (err) {
                console.error(err);
                alert("Error al iniciar voz: " + err.message);
                resetUI();
            }
        }
    </script>
</body>
</html>
